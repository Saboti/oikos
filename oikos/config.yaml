name: Oikos
version: "0.20.35"
slug: oikos
description: Self-hosted family planner – calendar, tasks, shopping, meals, budget, notes & contacts.
url: https://github.com/Saboti/oikos
arch:
  - amd64
  - aarch64

startup: application
boot: auto

# ── Web UI ──────────────────────────────────────────────────────────────────
# Direct port access (reliable, works with all browsers and PWA install)
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: Oikos web interface (direct access)

# Ingress (routes through HA reverse proxy)
# Note: Oikos uses absolute asset paths. Ingress will show the app but client-side
# navigation may break. Direct port access (above) is the recommended method.
ingress: true
ingress_port: 3000

# ── Options ─────────────────────────────────────────────────────────────────
# Optional string fields use "" as default – HA rejects None for str? fields.
# Empty strings are filtered out in run.sh before being exported as env vars.
options:
  log_level: info
  admin_username: ""
  admin_display_name: ""
  admin_password: ""
  weather_api_key: ""
  weather_city: ""
  weather_units: metric
  weather_lang: en

schema:
  log_level: list(debug|info|warn|error)
  admin_username: str
  admin_display_name: str
  admin_password: str
  weather_api_key: str
  weather_city: str
  weather_units: list(metric|imperial|kelvin)
  weather_lang: str
